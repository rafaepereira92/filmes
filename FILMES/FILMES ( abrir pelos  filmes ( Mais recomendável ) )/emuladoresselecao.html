    <script> <!-- Esse script é para dar dinâmica ao carrossel, fazendo ele se mexer sozinho para a direita lentamente, e quando chegar ao final, ele para (SE UTILIZA JAVA SCRIPT)-->
        window.addEventListener('DOMContentLoaded', () => { // Esse aqui vai ser um evento, abertura de um script dentro de uma máquina virtual de JavaScript
            const logado = localStorage.getItem('usuarioLogado'); // Variável fixa, que vai pegar a variável usuário Logado, quando o usuário digitar o nome dele lá e a senha
            const loginLink = document.getElementById('loginLink'); // Ele vai redirecionar ao link de login
            const logoutBtn = document.getElementById('logoutBtn'); // Ele vai ver se o usuário deslogou ou ainda está logado
            const userName = document.getElementById('userName'); // Ele pega o nome dele

            if (logado === 'true') { // Se logar o usuário
                // Usuário logado
                loginLink.style.display = 'none'; // A aba de login vai estar desativada
                logoutBtn.style.display = 'inline-block'; // E aparece o de logout

                const nomeUsuario = localStorage.getItem('nomeUsuario') || 'Usuário'; // Ai ele pega o nome do usuário
                userName.textContent = `Olá, ${nomeUsuario}`; // E dá boas-vindas

            }
            else { // Se não estiver logado
               // Bloquear os links de filme
               const links = document.querySelectorAll('main a'); // Meio que se alguém estiver no <main>, vai ser bloqueado aparecendo o símbolo de bloqueio
               links.forEach(link => {
                   link.removeAttribute('href'); // Métodos para bloquear a aba de filmes
                   link.style.cursor = 'not-allowed';
                   link.style.opacity = '0.6';

                   link.addEventListener('click', (e) => { // Se o usuário que não estiver logado tocar no filmes
                       e.preventDefault();
                       alert('Você precisa estar logado para acessar o nosso conteúdo'); // Aparece um alerta dizendo que precisa estar logado

                   });
               });

               // Esconder logout e nome se não estiver logado ( Nesse caso vai aparecer o Login, pois o usuário não está cadastrado )
                logoutBtn.style.display = 'none';
                userName.style.display = 'none';
            }

            logoutBtn.addEventListener('click', () => { // Se o usuário apertar em logout depois de se cadastrar
                localStorage.removeItem('usuarioLogado'); // Ele limpa no armazenamento de variáveis o nome do usuário e senha
                localStorage.removeItem('nomeUsuario');
                alert('Você saiu com sucesso!'); // E aparece que você realmente saiu
                window.location.href = 'login.html'; // E ele te redireciona ao login.html


            });

        });



    </script>

    <script> <!-- Outro script, mas esse é para o carrossel -->
        const carrossel = document.getElementById("carrossel"); // Ele pega a classe carrossel do html e pega informação dele para sincronizar
        const slides = document.querySelectorAll(".slide"); // E também do slide
        let index = 0; // Essa variável vai mudar com o tempo, ele vai servir para mexer os filmes para a direita ( Let é uma variável que pode ser mudada )
        let intervalo; // O intervalo de tempo também pode ser mudado

        function moverCarrossel() { // função mover carrossel
            index++; // A velocidade vertical vai aumentar
            if (index >= slides.length) { // E quando chegar no limite do slide, que é todas as imagens
                index = 0; // Ele zera, ou seja, volta para o início das imagens
            }
            carrossel.style.transform = `translateX(-${index * 210}px)`; // Ai volta tudo dnv
        }

        function iniciarCarrossel() { // Função para iniciar carrossel
            intervalo = setInterval(moverCarrossel, 2000); // Ele vai começar com o processo para ai sim rodar o mover carrossel
        }

        function pararCarrossel() { // Função parar carrossel, ou seja, quando o usuário passar o mouse para cima

            clearInterval(intervalo); // Ele trava o intervalo
        }

        iniciarCarrossel(); // Se começa com iniciar carrossel para funcionar

        carrossel.addEventListener("mouseenter", pararCarrossel); // Se o usuário colocar o mouse em cima, ele para o carrossel

        carrossel.addEventListener("mouseleave", iniciarCarrossel); // Quando ele tirar o mouse, ele volta normalmente

    </script>
